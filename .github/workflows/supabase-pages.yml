name: Deploy Supabase and GitHub Pages

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-supabase-pages
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply Supabase migrations
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      EXPECTED_SUPABASE_PROJECT_REF: iyckwryrucqrxwlowxow
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Require production Supabase coordinates
        shell: bash
        run: |
          : "${SUPABASE_ACCESS_TOKEN:?Configure SUPABASE_ACCESS_TOKEN in the production environment}"
          : "${SUPABASE_DB_PASSWORD:?Configure SUPABASE_DB_PASSWORD in the production environment}"
          : "${SUPABASE_PROJECT_REF:?Configure SUPABASE_PROJECT_REF as a repository variable}"
          if [ "$SUPABASE_PROJECT_REF" != "$EXPECTED_SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_PROJECT_REF does not match the reviewed production project" >&2
            exit 1
          fi

      - name: Link existing paid Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Inspect remote migration history before writes
        run: supabase migration list --linked

      - name: Preview pending migrations without writes
        run: supabase db push --linked --dry-run

      - name: Apply versioned Auth and API configuration
        run: supabase config push --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply versioned database and RPC migrations
        run: supabase db push --linked

      - name: Provision private exam grading keys
        shell: bash
        env:
          SUPABASE_EXAM_KEYS_B64: ${{ secrets.SUPABASE_EXAM_KEYS_B64 }}
        run: |
          : "${SUPABASE_EXAM_KEYS_B64:?Configure SUPABASE_EXAM_KEYS_B64 in the production environment}"
          key_file="$RUNNER_TEMP/contentengine-exam-keys.sql"
          command_log="$RUNNER_TEMP/contentengine-exam-keys.log"
          cleanup() {
            rm -f "$key_file" "$command_log"
          }
          trap cleanup EXIT
          KEY_FILE="$key_file" python3 - <<'PY'
          import base64
          import binascii
          import os
          from pathlib import Path

          try:
              payload = base64.b64decode(
                  os.environ["SUPABASE_EXAM_KEYS_B64"].strip(),
                  validate=True,
              )
          except (KeyError, binascii.Error, ValueError) as exc:
              raise SystemExit("SUPABASE_EXAM_KEYS_B64 is not valid base64") from exc
          if b"content_factory_private.training_answer_keys" not in payload:
              raise SystemExit("Exam-key payload targets an unexpected contract")
          if b"correct_answers" not in payload or b"catalog_contract" not in payload:
              raise SystemExit("Exam-key payload is incomplete")
          target = Path(os.environ["KEY_FILE"])
          target.write_bytes(payload)
          target.chmod(0o600)
          PY
          if ! supabase db query --linked --file "$key_file" >"$command_log" 2>&1; then
            echo "Private exam-key provisioning failed; output is withheld to protect grading material." >&2
            exit 1
          fi

      - name: Verify remote migration history
        run: supabase migration list --linked

      - name: Require JWT verification for creator invitations
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import tomllib

          entrypoint = Path("supabase/functions/creator-invite/index.ts")
          if not entrypoint.is_file():
              raise SystemExit("Missing creator-invite Edge Function entrypoint")
          config = tomllib.loads(
              Path("supabase/config.toml").read_text(encoding="utf-8")
          )
          function_config = config.get("functions", {}).get("creator-invite", {})
          if function_config.get("verify_jwt") is not True:
              raise SystemExit("creator-invite must set verify_jwt = true")
          PY

      - name: Deploy authenticated creator invitation function
        run: supabase functions deploy creator-invite --project-ref "$SUPABASE_PROJECT_REF"

  build-pages:
    name: Build browser-only creator workspace
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
    env:
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      EXPECTED_SUPABASE_PROJECT_REF: iyckwryrucqrxwlowxow
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Assemble static site with browser-safe configuration
        shell: bash
        run: |
          : "${SUPABASE_PROJECT_REF:?Configure SUPABASE_PROJECT_REF as a repository variable}"
          : "${SUPABASE_PUBLISHABLE_KEY:?Configure SUPABASE_PUBLISHABLE_KEY as a repository variable}"
          if [ "$SUPABASE_PROJECT_REF" != "$EXPECTED_SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_PROJECT_REF does not match the reviewed production project" >&2
            exit 1
          fi
          case "$SUPABASE_PUBLISHABLE_KEY" in
            sb_publishable_*) ;;
            *) echo "SUPABASE_PUBLISHABLE_KEY must be a browser-safe sb_publishable_ key" >&2; exit 1 ;;
          esac
          mkdir -p _site
          cp -R web/app/. _site/
          rm -f _site/config.example.js
          touch _site/.nojekyll
          test -f _site/index.html
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import re

          project_ref = os.environ["SUPABASE_PROJECT_REF"].strip()
          publishable_key = os.environ["SUPABASE_PUBLISHABLE_KEY"].strip()
          if re.fullmatch(r"[a-z0-9]{20}", project_ref) is None:
              raise SystemExit("SUPABASE_PROJECT_REF has an invalid format")
          if not publishable_key.startswith("sb_publishable_"):
              raise SystemExit("Only a browser-safe Supabase publishable key is allowed")
          config = {
              "APP_NAME": "Контент ИИ Завод",
              "SUPABASE_URL": f"https://{project_ref}.supabase.co",
              "SUPABASE_PUBLISHABLE_KEY": publishable_key,
              "RPC_SCHEMA": "public",
              "STORAGE_BUCKET": "contentengine-private",
              "MOCK_ONLY": True,
              "MAX_BATCH_SIZE": 50,
              "MAX_UPLOAD_BYTES": 52_428_800,
          }
          Path("_site/config.js").write_text(
              "window.CONTENTENGINE_CONFIG = Object.freeze("
              + json.dumps(config, ensure_ascii=False, separators=(",", ":"))
              + ");\n",
              encoding="utf-8",
          )
          PY

      - name: Reject server secrets and localhost from Pages artifact
        shell: bash
        run: |
          if grep -n -E 'sb_secret_|service_role|SUPABASE_DB_PASSWORD|SUPABASE_ACCESS_TOKEN' _site/config.js; then
            echo "Server-only material entered the generated browser configuration" >&2
            exit 1
          fi
          if grep -R -n -E 'sb_secret_[A-Za-z0-9._-]{16,}|sbp_[A-Za-z0-9._-]{16,}|postgres(ql)?://[^[:space:]"]+@' _site; then
            echo "A value shaped like a server credential entered the Pages artifact" >&2
            exit 1
          fi
          if grep -R -n -E '__SET_SUPABASE_|127\.0\.0\.1|localhost' _site; then
            echo "A placeholder or local endpoint entered the Pages artifact" >&2
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: _site

  deploy-pages:
    name: Publish creator workspace
    needs:
      - migrate
      - build-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
