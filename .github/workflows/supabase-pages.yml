name: Deploy Supabase and GitHub Pages

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-supabase-pages
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply Supabase migrations
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      EXPECTED_SUPABASE_PROJECT_REF: iyckwryrucqrxwlowxow
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Require production Supabase coordinates
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_OWNER_EMAIL: ${{ secrets.SUPABASE_OWNER_EMAIL }}
          RUNWAYML_API_SECRET: ${{ secrets.RUNWAYML_API_SECRET }}
        run: |
          if [ -n "${RUNWAYML_API_SECRET:-}" ]; then
            echo "::add-mask::$RUNWAYML_API_SECRET"
          fi
          : "${SUPABASE_ACCESS_TOKEN:?Configure SUPABASE_ACCESS_TOKEN in the production environment}"
          : "${SUPABASE_OWNER_EMAIL:?Configure SUPABASE_OWNER_EMAIL in the production environment}"
          : "${RUNWAYML_API_SECRET:?Configure RUNWAYML_API_SECRET in the production environment}"
          : "${SUPABASE_PROJECT_REF:?Configure SUPABASE_PROJECT_REF as a repository variable}"
          : "${SUPABASE_PUBLISHABLE_KEY:?Configure SUPABASE_PUBLISHABLE_KEY as a repository variable}"
          if [ "$SUPABASE_PROJECT_REF" != "$EXPECTED_SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_PROJECT_REF does not match the reviewed production project" >&2
            exit 1
          fi

      - name: Apply immutable migrations and private exam grading keys
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_EXAM_KEYS_B64: ${{ secrets.SUPABASE_EXAM_KEYS_B64 }}
        run: >-
          python scripts/deploy_supabase_management_api.py
          --migrations-dir supabase/migrations

      - name: Apply versioned Auth and API configuration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase config push --project-ref "$SUPABASE_PROJECT_REF"

      - name: Synchronize private Runway API secret
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RUNWAYML_API_SECRET: ${{ secrets.RUNWAYML_API_SECRET }}
        run: |
          echo "::add-mask::$RUNWAYML_API_SECRET"
          supabase secrets set \
            --project-ref "$SUPABASE_PROJECT_REF" \
            RUNWAYML_API_SECRET="$RUNWAYML_API_SECRET"

      - name: Require JWT verification for creator Edge Functions
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import tomllib

          config = tomllib.loads(
              Path("supabase/config.toml").read_text(encoding="utf-8")
          )
          for function_name in ("creator-invite", "creator-generate"):
              entrypoint = Path("supabase/functions") / function_name / "index.ts"
              if not entrypoint.is_file():
                  raise SystemExit(
                      f"Missing {function_name} Edge Function entrypoint"
                  )
              function_config = config.get("functions", {}).get(
                  function_name, {}
              )
              if function_config.get("verify_jwt") is not True:
                  raise SystemExit(
                      f"{function_name} must set verify_jwt = true"
                  )
          PY

      - name: Deploy authenticated creator invitation function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy creator-invite --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy authenticated real generation function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy creator-generate --project-ref "$SUPABASE_PROJECT_REF"

  build-pages:
    name: Build browser-only creator workspace
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: read
    env:
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      EXPECTED_SUPABASE_PROJECT_REF: iyckwryrucqrxwlowxow
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Assemble static site with browser-safe configuration
        shell: bash
        run: |
          : "${SUPABASE_PROJECT_REF:?Configure SUPABASE_PROJECT_REF as a repository variable}"
          : "${SUPABASE_PUBLISHABLE_KEY:?Configure SUPABASE_PUBLISHABLE_KEY as a repository variable}"
          if [ "$SUPABASE_PROJECT_REF" != "$EXPECTED_SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_PROJECT_REF does not match the reviewed production project" >&2
            exit 1
          fi
          case "$SUPABASE_PUBLISHABLE_KEY" in
            sb_publishable_*) ;;
            *) echo "SUPABASE_PUBLISHABLE_KEY must be a browser-safe sb_publishable_ key" >&2; exit 1 ;;
          esac
          mkdir -p _site
          cp -R web/app/. _site/
          rm -f _site/config.example.js
          touch _site/.nojekyll
          test -f _site/index.html
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import re

          project_ref = os.environ["SUPABASE_PROJECT_REF"].strip()
          publishable_key = os.environ["SUPABASE_PUBLISHABLE_KEY"].strip()
          if re.fullmatch(r"[a-z0-9]{20}", project_ref) is None:
              raise SystemExit("SUPABASE_PROJECT_REF has an invalid format")
          if not publishable_key.startswith("sb_publishable_"):
              raise SystemExit("Only a browser-safe Supabase publishable key is allowed")
          config = {
              "APP_NAME": "Контент ИИ Завод",
              "SUPABASE_URL": f"https://{project_ref}.supabase.co",
              "SUPABASE_PUBLISHABLE_KEY": publishable_key,
              "RPC_SCHEMA": "public",
              "STORAGE_BUCKET": "contentengine-private",
              "MOCK_ENABLED": True,
              "REAL_GENERATION_ENABLED": True,
              "REAL_PROVIDER": "runway",
              "REAL_MODEL": "gen4_turbo",
              "REAL_DURATION_SECONDS": 5,
              "REAL_ESTIMATED_CREDITS": 25,
              "REAL_ESTIMATED_COST_USD": 0.25,
              "MAX_BATCH_SIZE": 50,
              "MAX_UPLOAD_BYTES": 52_428_800,
          }
          Path("_site/config.js").write_text(
              "window.CONTENTENGINE_CONFIG = Object.freeze("
              + json.dumps(config, ensure_ascii=False, separators=(",", ":"))
              + ");\n",
              encoding="utf-8",
          )
          PY

      - name: Reject server secrets and localhost from Pages artifact
        shell: bash
        run: |
          if grep -n -E 'sb_secret_|service_role|SUPABASE_ACCESS_TOKEN|RUNWAYML_API_SECRET' _site/config.js; then
            echo "Server-only material entered the generated browser configuration" >&2
            exit 1
          fi
          if grep -R -n -E 'sb_secret_[A-Za-z0-9._-]{16,}|sbp_[A-Za-z0-9._-]{16,}|postgres(ql)?://[^[:space:]"]+@' _site; then
            echo "A value shaped like a server credential entered the Pages artifact" >&2
            exit 1
          fi
          if grep -R -n -E '__SET_SUPABASE_|127\.0\.0\.1|localhost' _site; then
            echo "A placeholder or local endpoint entered the Pages artifact" >&2
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: _site

  deploy-pages:
    name: Publish creator workspace
    needs:
      - migrate
      - build-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  bootstrap-owner:
    name: Provision first owner after Pages is live
    needs:
      - deploy-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      EXPECTED_SUPABASE_PROJECT_REF: iyckwryrucqrxwlowxow
    steps:
      - name: Check out deployed repository revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"

      - name: Provision first owner and send password setup
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_OWNER_EMAIL: ${{ secrets.SUPABASE_OWNER_EMAIL }}
        run: python scripts/bootstrap_supabase_owner.py --display-name "Сергей"
