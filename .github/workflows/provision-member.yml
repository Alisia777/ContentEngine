name: Provision limited Supabase member

on:
  workflow_dispatch:
    inputs:
      account:
        description: Protected account slot (PII stays in production secrets)
        required: true
        default: guest
        type: choice
        options:
          - guest
          - klimov
          - pavlenko
      role:
        description: Least-privilege membership role
        required: true
        default: viewer
        type: choice
        options:
          - viewer
          - trainee
      mode:
        description: Preview reads state only; apply may create or claim the account
        required: true
        default: preview
        type: choice
        options:
          - preview
          - apply
      claim_existing:
        description: Claim an unsigned-in, membership-free existing Auth identity
        required: true
        default: false
        type: boolean
      reset_signed_in:
        description: Reset a signed-in identity only when it has zero memberships
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-member-provision
  cancel-in-progress: false

jobs:
  provision-member:
    name: Provision limited confirmed account
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      EXPECTED_SUPABASE_PROJECT_REF: iyckwryrucqrxwlowxow
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Validate production project binding
        shell: bash
        env:
          PROVISION_MODE: ${{ inputs.mode }}
        run: |
          : "${SUPABASE_PROJECT_REF:?Configure SUPABASE_PROJECT_REF as a repository variable}"
          : "${SUPABASE_PUBLISHABLE_KEY:?Configure SUPABASE_PUBLISHABLE_KEY as a repository variable}"
          case "$PROVISION_MODE" in
            preview) ;;
            apply) ;;
            *)
              echo "Provision mode must be preview or apply" >&2
              exit 1
              ;;
          esac
          if [ "$SUPABASE_PROJECT_REF" != "$EXPECTED_SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_PROJECT_REF does not match the reviewed production project" >&2
            exit 1
          fi

      - name: Preview protected account plan
        if: inputs.mode == 'preview'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GUEST_EMAIL: ${{ secrets.SUPABASE_MEMBER_GUEST_EMAIL }}
          GUEST_DISPLAY_NAME: ${{ secrets.SUPABASE_MEMBER_GUEST_DISPLAY_NAME }}
          KLIMOV_EMAIL: ${{ secrets.SUPABASE_MEMBER_KLIMOV_EMAIL }}
          KLIMOV_DISPLAY_NAME: ${{ secrets.SUPABASE_MEMBER_KLIMOV_DISPLAY_NAME }}
          PAVLENKO_EMAIL: ${{ secrets.SUPABASE_MEMBER_PAVLENKO_EMAIL }}
          PAVLENKO_DISPLAY_NAME: ${{ secrets.SUPABASE_MEMBER_PAVLENKO_DISPLAY_NAME }}
          ACCOUNT_SLOT: ${{ inputs.account }}
          MEMBER_ROLE: ${{ inputs.role }}
          CLAIM_EXISTING: ${{ inputs.claim_existing }}
          RESET_SIGNED_IN: ${{ inputs.reset_signed_in }}
        shell: bash
        run: |
          : "${SUPABASE_ACCESS_TOKEN:?Configure SUPABASE_ACCESS_TOKEN in production}"
          case "$ACCOUNT_SLOT" in
            guest)
              MEMBER_EMAIL="$GUEST_EMAIL"
              MEMBER_DISPLAY_NAME="$GUEST_DISPLAY_NAME"
              DISTINCT_FROM_ONE="$KLIMOV_EMAIL"
              DISTINCT_FROM_TWO="$PAVLENKO_EMAIL"
              ;;
            klimov)
              MEMBER_EMAIL="$KLIMOV_EMAIL"
              MEMBER_DISPLAY_NAME="$KLIMOV_DISPLAY_NAME"
              DISTINCT_FROM_ONE="$GUEST_EMAIL"
              DISTINCT_FROM_TWO="$PAVLENKO_EMAIL"
              ;;
            pavlenko)
              MEMBER_EMAIL="$PAVLENKO_EMAIL"
              MEMBER_DISPLAY_NAME="$PAVLENKO_DISPLAY_NAME"
              DISTINCT_FROM_ONE="$GUEST_EMAIL"
              DISTINCT_FROM_TWO="$KLIMOV_EMAIL"
              ;;
            *)
              echo "Unknown protected account slot" >&2
              exit 1
              ;;
          esac
          : "${MEMBER_EMAIL:?Configure the selected account email secret in production}"
          : "${MEMBER_DISPLAY_NAME:?Configure the selected account display-name secret in production}"
          : "${DISTINCT_FROM_ONE:?Configure the first other account email secret in production}"
          : "${DISTINCT_FROM_TWO:?Configure the second other account email secret in production}"
          args=(
            --email="$MEMBER_EMAIL"
            --display-name="$MEMBER_DISPLAY_NAME"
            --role="$MEMBER_ROLE"
            --distinct-from="$DISTINCT_FROM_ONE"
            --distinct-from="$DISTINCT_FROM_TWO"
            --dry-run
          )
          if [ "$CLAIM_EXISTING" = "true" ]; then
            args+=(--claim-existing)
          fi
          if [ "$RESET_SIGNED_IN" = "true" ]; then
            args+=(--reset-signed-in)
          fi
          python -m scripts.provision_supabase_member "${args[@]}"

      - name: Apply protected account plan without logging its password
        if: inputs.mode == 'apply'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GUEST_TEMP_PASSWORD: ${{ secrets.SUPABASE_MEMBER_GUEST_TEMP_PASSWORD }}
          KLIMOV_TEMP_PASSWORD: ${{ secrets.SUPABASE_MEMBER_KLIMOV_TEMP_PASSWORD }}
          PAVLENKO_TEMP_PASSWORD: ${{ secrets.SUPABASE_MEMBER_PAVLENKO_TEMP_PASSWORD }}
          GUEST_EMAIL: ${{ secrets.SUPABASE_MEMBER_GUEST_EMAIL }}
          GUEST_DISPLAY_NAME: ${{ secrets.SUPABASE_MEMBER_GUEST_DISPLAY_NAME }}
          KLIMOV_EMAIL: ${{ secrets.SUPABASE_MEMBER_KLIMOV_EMAIL }}
          KLIMOV_DISPLAY_NAME: ${{ secrets.SUPABASE_MEMBER_KLIMOV_DISPLAY_NAME }}
          PAVLENKO_EMAIL: ${{ secrets.SUPABASE_MEMBER_PAVLENKO_EMAIL }}
          PAVLENKO_DISPLAY_NAME: ${{ secrets.SUPABASE_MEMBER_PAVLENKO_DISPLAY_NAME }}
          ACCOUNT_SLOT: ${{ inputs.account }}
          MEMBER_ROLE: ${{ inputs.role }}
          CLAIM_EXISTING: ${{ inputs.claim_existing }}
          RESET_SIGNED_IN: ${{ inputs.reset_signed_in }}
        shell: bash
        run: |
          : "${SUPABASE_ACCESS_TOKEN:?Configure SUPABASE_ACCESS_TOKEN in production}"
          case "$ACCOUNT_SLOT" in
            guest)
              MEMBER_EMAIL="$GUEST_EMAIL"
              MEMBER_DISPLAY_NAME="$GUEST_DISPLAY_NAME"
              TEMP_PASSWORD_FOR_SLOT="$GUEST_TEMP_PASSWORD"
              DISTINCT_FROM_ONE="$KLIMOV_EMAIL"
              DISTINCT_FROM_TWO="$PAVLENKO_EMAIL"
              ;;
            klimov)
              MEMBER_EMAIL="$KLIMOV_EMAIL"
              MEMBER_DISPLAY_NAME="$KLIMOV_DISPLAY_NAME"
              TEMP_PASSWORD_FOR_SLOT="$KLIMOV_TEMP_PASSWORD"
              DISTINCT_FROM_ONE="$GUEST_EMAIL"
              DISTINCT_FROM_TWO="$PAVLENKO_EMAIL"
              ;;
            pavlenko)
              MEMBER_EMAIL="$PAVLENKO_EMAIL"
              MEMBER_DISPLAY_NAME="$PAVLENKO_DISPLAY_NAME"
              TEMP_PASSWORD_FOR_SLOT="$PAVLENKO_TEMP_PASSWORD"
              DISTINCT_FROM_ONE="$GUEST_EMAIL"
              DISTINCT_FROM_TWO="$KLIMOV_EMAIL"
              ;;
            *)
              echo "Unknown protected account slot" >&2
              exit 1
              ;;
          esac
          : "${MEMBER_EMAIL:?Configure the selected account email secret in production}"
          : "${MEMBER_DISPLAY_NAME:?Configure the selected account display-name secret in production}"
          : "${DISTINCT_FROM_ONE:?Configure the first other account email secret in production}"
          : "${DISTINCT_FROM_TWO:?Configure the second other account email secret in production}"
          if [ -n "$TEMP_PASSWORD_FOR_SLOT" ]; then
            echo "::add-mask::$TEMP_PASSWORD_FOR_SLOT"
          fi
          export CONTENTENGINE_MEMBER_DISPATCH_PASSWORD="$TEMP_PASSWORD_FOR_SLOT"
          MEMBER_PASSWORD_DISPATCH_ID="${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}:${ACCOUNT_SLOT}"
          args=(
            --email="$MEMBER_EMAIL"
            --display-name="$MEMBER_DISPLAY_NAME"
            --account-slot="$ACCOUNT_SLOT"
            --password-dispatch-id="$MEMBER_PASSWORD_DISPATCH_ID"
            --role="$MEMBER_ROLE"
            --distinct-from="$DISTINCT_FROM_ONE"
            --distinct-from="$DISTINCT_FROM_TWO"
          )
          if [ "$CLAIM_EXISTING" = "true" ]; then
            args+=(--claim-existing)
          fi
          if [ "$RESET_SIGNED_IN" = "true" ]; then
            args+=(--reset-signed-in)
          fi
          python -m scripts.provision_supabase_member "${args[@]}"
