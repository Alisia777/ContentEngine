name: Provision limited Supabase member

on:
  workflow_dispatch:
    inputs:
      email:
        description: Exact member email
        required: true
        type: string
      display_name:
        description: Member display name
        required: true
        type: string
      role:
        description: Least-privilege membership role
        required: true
        default: viewer
        type: choice
        options:
          - viewer
          - trainee
      claim_existing:
        description: Claim an unsigned-in, membership-free existing Auth identity
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-member-provision
  cancel-in-progress: false

jobs:
  provision-member:
    name: Provision limited confirmed account
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      EXPECTED_SUPABASE_PROJECT_REF: iyckwryrucqrxwlowxow
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Require protected provisioning inputs
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_MEMBER_TEMP_PASSWORD: ${{ secrets.SUPABASE_MEMBER_TEMP_PASSWORD }}
        run: |
          : "${SUPABASE_ACCESS_TOKEN:?Configure SUPABASE_ACCESS_TOKEN in production}"
          : "${SUPABASE_MEMBER_TEMP_PASSWORD:?Configure a one-time member password in production}"
          : "${SUPABASE_PROJECT_REF:?Configure SUPABASE_PROJECT_REF as a repository variable}"
          : "${SUPABASE_PUBLISHABLE_KEY:?Configure SUPABASE_PUBLISHABLE_KEY as a repository variable}"
          if [ "$SUPABASE_PROJECT_REF" != "$EXPECTED_SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_PROJECT_REF does not match the reviewed production project" >&2
            exit 1
          fi

      - name: Provision limited account without logging its password
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_MEMBER_TEMP_PASSWORD: ${{ secrets.SUPABASE_MEMBER_TEMP_PASSWORD }}
          MEMBER_EMAIL: ${{ inputs.email }}
          MEMBER_DISPLAY_NAME: ${{ inputs.display_name }}
          MEMBER_ROLE: ${{ inputs.role }}
          CLAIM_EXISTING: ${{ inputs.claim_existing }}
        shell: bash
        run: |
          args=(
            --email="$MEMBER_EMAIL"
            --display-name="$MEMBER_DISPLAY_NAME"
            --role="$MEMBER_ROLE"
          )
          if [ "$CLAIM_EXISTING" = "true" ]; then
            args+=(--claim-existing)
          fi
          python -m scripts.provision_supabase_member "${args[@]}"
