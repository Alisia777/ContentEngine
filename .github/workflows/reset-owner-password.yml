name: "ONE-SHOT: reset production owner password"

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "ONE-SHOT WARNING: enter RESET_PRODUCTION_OWNER_PASSWORD_ONCE to rotate the production owner credential"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-owner-password-reset
  cancel-in-progress: false

jobs:
  reset-owner-password:
    name: Reset production owner password exactly once
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event.inputs.confirmation == 'RESET_PRODUCTION_OWNER_PASSWORD_ONCE'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - name: Check out reviewed main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: "ONE-SHOT WARNING: rotate protected production credential"
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_OWNER_EMAIL: ${{ secrets.SUPABASE_OWNER_EMAIL }}
          SUPABASE_OWNER_TEMP_PASSWORD: ${{ secrets.SUPABASE_OWNER_TEMP_PASSWORD }}
        run: |
          set -euo pipefail
          : "${SUPABASE_ACCESS_TOKEN:?Configure SUPABASE_ACCESS_TOKEN in production}"
          : "${SUPABASE_OWNER_EMAIL:?Configure SUPABASE_OWNER_EMAIL in production}"
          : "${SUPABASE_OWNER_TEMP_PASSWORD:?Configure a one-time owner password in production}"
          : "${SUPABASE_PROJECT_REF:?Configure SUPABASE_PROJECT_REF as a repository variable}"
          if [ "$SUPABASE_PROJECT_REF" != "iyckwryrucqrxwlowxow" ]; then
            echo "SUPABASE_PROJECT_REF does not match the reviewed production project" >&2
            exit 1
          fi
          python -m scripts.reset_supabase_owner_password
