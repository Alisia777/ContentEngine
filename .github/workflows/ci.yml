name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python tests · shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    env:
      QVF_PYTEST_SHARD_INDEX: ${{ matrix.shard }}
      QVF_PYTEST_SHARD_TOTAL: "6"
      QVF_DATABASE_URL: sqlite:///./ci-qharisma-${{ matrix.shard }}.db
      QVF_MEDIA_ROOT: ci-media-${{ matrix.shard }}
      QVF_AUTH_REQUIRED: "false"
      QVF_PUBLIC_PILOT_MODE: "true"
      QVF_PUBLIC_PILOT_INVITE_ONLY: "false"
      QVF_ALLOW_REAL_SPEND: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Validate GitHub workflow YAML syntax
        run: python -c "import pathlib, yaml; [yaml.safe_load(path.read_text(encoding='utf-8')) for path in pathlib.Path('.github/workflows').glob('*.yml')]"

      - name: Compile application
        run: python -m compileall -q app scripts

      - name: Run test suite
        run: python -m pytest -q -p scripts.pytest_shard_plugin

  supabase-migrations:
    name: Validate Supabase migrations and RPC contract
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Start local Supabase database and apply migrations
        run: supabase db start

      - name: Lint migrated database
        run: supabase db lint --local --level error

      - name: Run database security and workflow contract tests
        run: supabase test db

  creator-edge-functions:
    name: Validate authenticated creator Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.8.1

      - name: Require JWT verification and entrypoints
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import tomllib

          config = tomllib.loads(
              Path("supabase/config.toml").read_text(encoding="utf-8")
          )
          for function_name in (
              "creator-invite",
              "creator-set-password",
              "creator-generate",
              "creator-product-research",
              "creator-content-review",
          ):
              entrypoint = Path("supabase/functions") / function_name / "index.ts"
              if not entrypoint.is_file():
                  raise SystemExit(
                      f"Missing {function_name} Edge Function entrypoint"
                  )
              function_config = config.get("functions", {}).get(
                  function_name, {}
              )
              if function_config.get("verify_jwt") is not True:
                  raise SystemExit(
                      f"{function_name} must set verify_jwt = true"
                  )
          PY

      - name: Check function formatting
        run: |
          deno fmt --check supabase/functions/creator-invite
          deno fmt --check supabase/functions/creator-set-password
          deno fmt --check supabase/functions/creator-generate
          deno fmt --check supabase/functions/creator-product-research
          deno fmt --check supabase/functions/creator-content-review

      - name: Lint function
        run: |
          deno lint supabase/functions/creator-invite/index.ts
          deno lint supabase/functions/creator-set-password/index.ts
          deno lint supabase/functions/creator-generate/index.ts
          deno lint supabase/functions/creator-product-research/index.ts
          deno lint supabase/functions/creator-content-review/index.ts

      - name: Type-check function
        run: |
          deno check supabase/functions/creator-invite/index.ts
          deno check supabase/functions/creator-set-password/index.ts
          deno check supabase/functions/creator-generate/index.ts
          deno check supabase/functions/creator-product-research/index.ts
          deno check supabase/functions/creator-content-review/index.ts

  reference-postgres-migration:
    name: Validate reference Alembic/PostgreSQL model
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: contentengine
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d contentengine"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      QVF_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/contentengine
      QVF_MEDIA_ROOT: ci-media
      QVF_RUNTIME_PROFILE: test
      QVF_AUTH_REQUIRED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Apply historical first cloud revision
        run: python -m alembic upgrade 24aaca5b4358

      - name: Simulate database stamped before forward integrity revision
        run: |
          python - <<'PY'
          from sqlalchemy import text

          from app.database import engine
          from app.postgres_integrity import drop_postgresql_integrity_guards

          with engine.begin() as connection:
              drop_postgresql_integrity_guards(connection)
              for role_name in ("anon", "authenticated", "service_role"):
                  connection.execute(text(f"CREATE ROLE {role_name} NOLOGIN"))
                  connection.execute(
                      text(
                          "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public "
                          f"TO {role_name}"
                      )
                  )
                  connection.execute(
                      text(
                          "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public "
                          f"TO {role_name}"
                      )
                  )
                  connection.execute(
                      text(
                          "ALTER DEFAULT PRIVILEGES IN SCHEMA public "
                          f"GRANT ALL PRIVILEGES ON TABLES TO {role_name}"
                      )
                  )
                  connection.execute(
                      text(
                          "ALTER DEFAULT PRIVILEGES IN SCHEMA public "
                          f"GRANT ALL PRIVILEGES ON SEQUENCES TO {role_name}"
                      )
                  )
          print("Historical PostgreSQL guard and exposed API-role state prepared")
          PY

      - name: Apply reference Alembic migrations from historical revision
        run: python scripts/predeploy.py

      - name: Verify PostgreSQL integrity guards
        run: python scripts/verify_postgres_integrity.py

      - name: Verify PostgreSQL public-schema security
        run: python scripts/verify_postgres_schema_security.py

      - name: Verify models match the migration head
        run: python -m alembic check

      - name: Verify migration is current
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.runtime.migration import MigrationContext
          from alembic.script import ScriptDirectory
          from app.database import engine

          config = Config("alembic.ini")
          expected = set(ScriptDirectory.from_config(config).get_heads())
          with engine.connect() as connection:
              actual = set(MigrationContext.configure(connection).get_current_heads())
          if actual != expected:
              raise SystemExit(f"database heads {sorted(actual)} != migration heads {sorted(expected)}")
          print(f"PostgreSQL migration head verified: {sorted(actual)}")
          PY
